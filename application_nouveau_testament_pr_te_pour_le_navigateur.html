                            {t.mainTitle}
                          </h2>
                          <p className="text-stone-400 text-sm max-w-xl">
                            {t.mainDesc}
                          </p>
                          <div className="flex flex-wrap gap-3 pt-2">
                            <button 
                              onClick={() => setActiveTab('explorer')}
                              className="px-4 py-2 bg-amber-600 text-stone-950 rounded-xl font-bold text-xs hover:bg-amber-500 transition shadow-md flex items-center gap-2"
                            >
                              {t.startNav} →
                            </button>
                          </div>
                        </div>

                        {/* Progression */}
                        <div className="bg-stone-900/80 border border-stone-800 p-5 rounded-xl space-y-4 shadow-inner">
                          <span className="text-stone-400 text-xs font-semibold">{t.progress}</span>
                          <div>
                            <div className="flex justify-between items-end mb-1">
                              <span className="text-2xl font-bold text-amber-400 font-mono">{readVersesCount}</span>
                              <span className="text-xs text-stone-500 font-mono">{t.ofVerses}</span>
                            </div>
                            <div className="w-full bg-stone-800 h-2 rounded-full overflow-hidden">
                              <div className="bg-gradient-to-r from-amber-600 to-yellow-500 h-full rounded-full transition-all duration-500" style={{ width: `${Math.min(100, (readVersesCount / 7957) * 100)}%` }} />
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>

                    {/* Bibliothèque */}
                    <div className="space-y-4">
                      <div>
                        <h3 className="text-lg font-serif font-bold text-amber-100">{t.libTitle}</h3>
                        <p className="text-xs text-stone-400">{t.libDesc}</p>
                      </div>

                      <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3">
                        {NT_BOOKS.map((book) => (
                          <div 
                            key={book.id}
                            onClick={() => navigateToBook(book)}
                            className="group bg-stone-950 hover:bg-stone-900 border border-stone-800 hover:border-amber-600/40 p-4 rounded-xl cursor-pointer transition duration-200 relative overflow-hidden"
                          >
                            <span className="text-[9px] text-stone-500 font-semibold uppercase block mb-1">
                              {lang === 'nl' ? book.categoryNl : book.category}
                            </span>
                            <h4 className="font-serif font-bold text-stone-200 group-hover:text-amber-300 text-sm">
                              {lang === 'nl' ? book.nameNl : book.name}
                            </h4>
                            <div className="mt-4 pt-2 border-t border-stone-900 flex items-center justify-between text-stone-500 text-[10px]">
                              <span>{book.chapters} ch.</span>
                              <span className="text-amber-500/80 font-bold">{book.totalVerses} v.</span>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}

                {/* EXPLORATEUR DE LIVRES */}
                {activeTab === 'explorer' && (
                  <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                    
                    {/* Colonne gauche de sélection */}
                    <div className="lg:col-span-4 bg-stone-950 border border-stone-800 rounded-xl p-5 space-y-4">
                      <h3 className="text-sm font-bold text-amber-400 font-serif border-b border-stone-800 pb-2">
                        {t.selectorTitle}
                      </h3>
                      
                      <div className="space-y-1.5">
                        <label className="text-xs text-stone-400 font-semibold block">{t.bookLabel}</label>
                        <select 
                          value={selectedBook.id}
                          onChange={(e) => {
                            const book = NT_BOOKS.find(b => b.id === e.target.value);
                            setSelectedBook(book);
                            setSelectedChapter(1);
                            setSelectedVerse(1);
                          }}
                          className="w-full bg-stone-900 border border-stone-800 rounded-xl px-3 py-2 text-stone-200 text-sm focus:outline-none"
                        >
                          {NT_BOOKS.map(book => (
                            <option key={book.id} value={book.id}>
                              {lang === 'nl' ? book.nameNl : book.name} ({book.chapters} ch.)
                            </option>
                          ))}
                        </select>
                      </div>

                      <div className="space-y-1.5">
                        <label className="text-xs text-stone-400 font-semibold flex justify-between">
                          <span>{t.chapLabel}</span>
                          <span>Max: {selectedBook.chapters}</span>
                        </label>
                        <div className="flex gap-1.5 max-h-[120px] overflow-y-auto flex-wrap p-2 bg-stone-900 rounded-xl">
                          {Array.from({ length: selectedBook.chapters }, (_, i) => i + 1).map((chap) => (
                            <button
                              key={chap}
                              onClick={() => {
                                setSelectedChapter(chap);
                                setSelectedVerse(1);
                              }}
                              className={`w-8 h-8 rounded text-xs font-bold transition flex items-center justify-center ${selectedChapter === chap ? 'bg-amber-600 text-stone-950' : 'bg-stone-950 hover:bg-stone-800'}`}
                            >
                              {chap}
                            </button>
                          ))}
                        </div>
                      </div>

                      {/* Métadonnées */}
                      <div className="bg-stone-900/60 p-3.5 rounded-lg border border-stone-800/60 text-xs space-y-2">
                        <span className="font-semibold text-amber-500 block">{t.aboutBook}</span>
                        <p className="text-stone-400 leading-relaxed">
                          <strong>{t.author} :</strong> {lang === 'nl' ? selectedBook.authorNl : selectedBook.author} <br />
                          <strong>{t.date} :</strong> {lang === 'nl' ? selectedBook.dateNl : selectedBook.date} <br />
                          <strong>{t.theme} :</strong> {lang === 'nl' ? selectedBook.themeNl : selectedBook.theme}
                        </p>
                      </div>
                    </div>

                    {/* Zone de lecture de droite */}
                    <div className="lg:col-span-8 flex flex-col gap-6">
                      
                      <div className="bg-stone-950 border border-stone-800 rounded-xl p-6 md:p-8 space-y-6 shadow-xl relative">
                        <div className="flex items-center justify-between pb-4 border-b border-stone-900">
                          <div>
                            <span className="text-[10px] bg-amber-500/10 text-amber-400 px-2.5 py-1 rounded-full font-bold">
                              {lang === 'nl' ? selectedBook.categoryNl : selectedBook.category}
                            </span>
                            <h2 className="text-2xl font-serif font-bold text-stone-100 mt-2">
                              {lang === 'nl' ? selectedBook.nameNl : selectedBook.name} {selectedChapter}:{selectedVerse}
                            </h2>
                          </div>
                          <div className="flex gap-2">
                            <button onClick={toggleReadStatus} className="p-2 bg-stone-900 hover:bg-stone-800 rounded border border-stone-800">
                              {markedAsRead[`${selectedBook.id}-${selectedChapter}-${selectedVerse}`] ? "✅ Lu" : "📖 Marquer lu"}
                            </button>
                            <button onClick={copyToClipboard} className="p-2 bg-stone-900 hover:bg-stone-800 rounded border border-stone-800">
                              📋 Copier
                            </button>
                          </div>
                        </div>

                        {/* Le Texte principal */}
                        <div className="py-6 text-center">
                          <p className="text-xl md:text-2xl font-serif italic text-stone-100 leading-relaxed font-semibold">
                            "{currentVerseText}"
                          </p>
                          <span className="text-xs text-stone-500 mt-4 block">
                            {t.versionLabel} : {currentVerseTranslation}
                          </span>
                        </div>

                        {/* Actions Vocales */}
                        <div className="flex items-center justify-between pt-4 border-t border-stone-900 bg-stone-900/30 p-3 rounded-lg">
                          <button 
                            onClick={() => speakVerseText(currentVerseText)}
                            className="px-4 py-2 bg-stone-800 hover:bg-stone-700 text-xs font-bold rounded-lg flex items-center gap-2"
                          >
                            🔊 {isSpeaking ? t.listening : t.listenWord}
                          </button>
                        </div>
                      </div>

                      {/* Résumé Complet et Essence */}
                      <div className="bg-stone-950 border border-stone-800 rounded-xl p-6 space-y-4">
                        <h3 className="font-serif font-bold text-stone-100 text-base">{t.summarySection}</h3>
                        <p className="text-xs text-stone-300 leading-relaxed italic bg-stone-900/40 p-4 rounded-xl">
                          {lang === 'nl' ? selectedBook.summaryNl : selectedBook.summaryFr}
                        </p>

                        <div className="space-y-3 pt-2">
                          <h4 className="text-xs font-bold text-amber-400 uppercase tracking-wider">{t.keyPassagesSection}</h4>
                          <div className="space-y-3">
                            {selectedBook.keyVerses?.map((kv, idx) => (
                              <div key={idx} className="bg-stone-900/80 p-4 rounded-xl border border-stone-800 space-y-2">
                                <div className="flex justify-between items-center text-[10px] font-mono text-stone-400">
                                  <span>{lang === 'nl' ? selectedBook.nameNl : selectedBook.name} {kv.ref}</span>
                                </div>
                                <p className="text-stone-100 font-serif italic text-sm">
                                  "{lang === 'nl' ? kv.textNl : kv.text}"
                                </p>
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>

                    </div>

                  </div>
                )}

                {/* TAB QUIZ */}
                {activeTab === 'quiz' && (
                  <div className="max-w-xl mx-auto bg-stone-950 border border-stone-800 rounded-xl p-6 shadow-xl">
                    <h3 className="text-base font-serif font-bold text-amber-400 pb-4 border-b border-stone-900 uppercase">
                      {t.quizTitle}
                    </h3>

                    {!quizFinished ? (
                      <div className="space-y-6 pt-4">
                        <div className="flex justify-between text-xs text-stone-400 font-mono">
                          <span>Question {currentQuizIndex + 1} / {quizQuestions.length}</span>
                          <span>Score : {quizScore}</span>
                        </div>

                        <h4 className="text-lg font-serif font-bold text-stone-100">
                          {quizQuestions[currentQuizIndex].question}
                        </h4>

                        <div className="grid grid-cols-1 gap-2.5">
                          {quizQuestions[currentQuizIndex].options.map((option, idx) => {
                            let btnStyle = "bg-stone-900 border-stone-800 text-stone-300 hover:bg-stone-800/50";
                            if (selectedOption !== null) {
                              if (idx === quizQuestions[currentQuizIndex].answer) {
                                btnStyle = "bg-green-500/10 border-green-500 text-green-400 font-bold";
                              } else if (selectedOption === idx) {
                                btnStyle = "bg-red-500/10 border-red-500 text-red-400";
                              } else {
                                btnStyle = "bg-stone-950 border-stone-900 text-stone-600";
                              }
                            }

                            return (
                              <button
                                key={idx}
                                onClick={() => handleAnswerSubmit(idx)}
                                disabled={selectedOption !== null}
                                className={`w-full text-left p-4 rounded-xl border text-sm transition ${btnStyle}`}
                              >
                                {option}
                              </button>
                            );
                          })}
                        </div>

                        {showExplanation && (
                          <div className="bg-amber-500/5 border border-amber-500/20 p-4 rounded-xl space-y-2">
                            <span className="text-xs text-amber-500 font-bold">{t.explanationTitle}</span>
                            <p className="text-xs text-stone-300 leading-relaxed">
                              {quizQuestions[currentQuizIndex].explanation}
                            </p>
                            <button 
                              onClick={nextQuizQuestion}
                              className="mt-3 w-full py-2 bg-stone-900 hover:bg-stone-800 text-amber-300 font-semibold rounded-lg text-xs"
                            >
                              {t.nextQuestion} →
                            </button>
                          </div>
                        )}
                      </div>
                    ) : (
                      <div className="text-center py-8 space-y-6">
                        <h4 className="text-xl font-serif font-bold text-stone-100">Examen Complété !</h4>
                        <p className="text-sm text-stone-400">Score Final : {quizScore} / {quizQuestions.length}</p>
                        <button onClick={resetQuiz} className="px-6 py-2 bg-amber-600 text-stone-950 font-bold rounded-lg text-xs transition">
                          {t.restartBtn}
                        </button>
                      </div>
                    )}
                  </div>
                )}

              </main>

              {/* FOOTER */}
              <footer className="border-t border-stone-800/60 bg-stone-950 py-6 mt-12 text-center text-xs text-stone-500 font-mono">
                <p>© 2026 Testamentum. {t.footerText}</p>
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

</body>
</html>
